<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Praxis — MESIAS Governance</title>
<style>
:root{--bg:#0a0a0f;--surface:rgba(255,255,255,0.035);--surface-hover:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.06);--text:#f0f0f5;--muted:rgba(255,255,255,0.50);--dim:rgba(255,255,255,0.30);--accent:#6366f1;--accent-glow:rgba(99,102,241,0.30);--secondary:#50e3c2;--warn:#fb923c;--danger:#ef4444;--success:#34d399;--info:#38bdf8;--shadow-card:0 2px 20px rgba(0,0,0,0.28),0 0 0 1px rgba(255,255,255,0.04);--radius:12px;--radius-lg:16px;--radius-pill:999px;--ease:cubic-bezier(0.16,1,0.3,1);--fast:0.2s cubic-bezier(0.4,0,0.2,1);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.aurora::before,.aurora::after{content:'';position:absolute;border-radius:50%;filter:blur(140px);opacity:0.18;animation:af 20s ease-in-out infinite alternate;}
.aurora::before{width:500px;height:500px;background:radial-gradient(circle,#6366f1 0%,transparent 70%);top:-12%;left:-6%;}
.aurora::after{width:400px;height:400px;background:radial-gradient(circle,#50e3c2 0%,transparent 70%);bottom:-15%;right:-6%;animation-delay:-9s;}
@keyframes af{0%{transform:translate(0,0) scale(1);}50%{transform:translate(25px,-18px) scale(1.06);}100%{transform:translate(-18px,10px) scale(0.96);}}
.container{max-width:1400px;margin:0 auto;padding:2rem;position:relative;z-index:2;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#f0f0f5 30%,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-header .subtitle{color:var(--muted);font-size:0.9rem;}
.nav{display:flex;gap:0.5rem;flex-wrap:wrap;}
.nav a{padding:0.4rem 1rem;background:var(--surface);color:var(--muted);text-decoration:none;border-radius:var(--radius-pill);font-size:0.8rem;font-weight:500;transition:all var(--fast);backdrop-filter:blur(12px);}
.nav a:hover,.nav a.active{background:var(--surface-hover);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.nav a.active{border:1px solid var(--accent);color:var(--accent);}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2rem;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;}
@media(max-width:1024px){.grid-3,.grid-2{grid-template-columns:1fr;}}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow-card);backdrop-filter:blur(16px);transition:all var(--fast);}
.card:hover{box-shadow:0 8px 40px rgba(99,102,241,0.14),0 0 0 1px rgba(255,255,255,0.08);}
.card-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);}
.dim-bar{display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--border);}
.dim-bar:last-child{border-bottom:none;}
.dim-name{font-size:0.85rem;font-weight:600;min-width:140px;text-transform:capitalize;}
.dim-track{flex:1;height:12px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden;}
.dim-fill{height:100%;border-radius:6px;transition:width 0.8s var(--ease);}
.dim-val{font-size:0.78rem;color:var(--muted);min-width:50px;text-align:right;font-variant-numeric:tabular-nums;}
.big-num{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.tag{display:inline-block;padding:0.15rem 0.5rem;border-radius:var(--radius-pill);font-size:0.72rem;font-weight:600;margin:0.15rem;}
.tag-ok{background:rgba(52,211,153,0.15);color:var(--success);}
.tag-warn{background:rgba(251,146,60,0.15);color:var(--warn);}
.tag-err{background:rgba(251,113,133,0.15);color:var(--danger);}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.55rem 1.2rem;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all var(--fast);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;box-shadow:0 2px 16px var(--accent-glow);}
.btn-primary:hover{box-shadow:0 6px 24px rgba(99,102,241,0.40);transform:translateY(-1px);}
input,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:0.6rem 1rem;font-size:0.88rem;width:100%;font-family:inherit;transition:border var(--fast);}
input:focus,textarea:focus{outline:none;border-color:var(--accent);}
.loading{text-align:center;padding:3rem;color:var(--dim);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:0.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.risk-badge{display:inline-block;padding:0.3rem 0.8rem;border-radius:var(--radius-pill);font-size:0.82rem;font-weight:700;text-transform:uppercase;}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="container">
  <div class="page-header">
    <div>
      <h1>MESIAS Governance</h1>
      <span class="subtitle">Ethical Evaluation · Risk Scoring · VSD · Governance Workspace · Efficiency</span>
    </div>
    <nav class="nav">
      <a href="/static/cognitive-dashboard.html">Cognitive</a>
      <a href="/static/reasoning-router.html">Router</a>
      <a href="/static/dsrp-ontology.html">DSRP</a>
      <a href="/static/codes-resonance.html">CODES</a>
      <a href="/static/coala-memory.html">CoALA</a>
      <a href="/static/repe-transparency.html">RepE</a>
      <a href="/static/mesias-governance.html" class="active">MESIAS</a>
    </nav>
  </div>

  <!-- Ethical Evaluation -->
  <div class="card" style="margin-bottom:2rem;">
    <div class="card-title"><span class="dot"></span>Ethical Evaluation</div>
    <input id="eval-subject" placeholder="Subject of evaluation..." style="margin-bottom:0.75rem;"/>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem;" id="ethics-inputs"></div>
    <button class="btn btn-primary" style="margin-top:1rem;" onclick="runEthics()">Evaluate</button>
  </div>
  <div id="ethics-result" style="display:none;" class="grid-2">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Dimension Scores</div>
      <div id="dim-scores"></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>Evaluation Summary</div>
      <div id="eval-summary"></div>
    </div>
  </div>

  <!-- Risk Assessment -->
  <div class="card" style="margin-bottom:2rem;">
    <div class="card-title"><span class="dot"></span>Risk Assessment</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
      <div><label style="font-size:0.78rem;color:var(--muted);display:block;margin-bottom:0.2rem;">Operation</label><input id="risk-op" placeholder="Operation name"/></div>
      <div><label style="font-size:0.78rem;color:var(--muted);display:block;margin-bottom:0.2rem;">Impact (0-1)</label><input id="risk-impact" type="number" min="0" max="1" step="0.1" value="0.5"/></div>
      <div><label style="font-size:0.78rem;color:var(--muted);display:block;margin-bottom:0.2rem;">Likelihood (0-1)</label><input id="risk-like" type="number" min="0" max="1" step="0.1" value="0.3"/></div>
    </div>
    <button class="btn btn-primary" style="margin-top:1rem;" onclick="runRisk()">Assess Risk</button>
    <div id="risk-result" style="margin-top:1rem;"></div>
  </div>

  <!-- Governance & Efficiency -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Governance Workspace</div>
      <div id="gov-status"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>MESIAS Summary</div>
      <div id="mesias-info"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
const API=window.location.origin;
const DIMS=['autonomy','beneficence','non_maleficence','justice','transparency','accountability','privacy'];
function init(){
  const c=document.getElementById('ethics-inputs');
  DIMS.forEach(d=>{c.innerHTML+=`<div><label style="font-size:0.75rem;color:var(--muted);display:block;margin-bottom:0.2rem;">${d.replace(/_/g,' ')}</label><input type="number" id="ed-${d}" min="0" max="1" step="0.1" value="0.7"/></div>`;});
}
async function loadSummary(){
  try{
    const r=await fetch(API+'/v22/mesias/summary');
    const d=await r.json();
    let h=`<div style="font-size:0.85rem;color:var(--muted);line-height:1.7;">`;
    h+=`<strong style="color:var(--text)">Dimensions:</strong> ${(d.ethical_dimensions||[]).join(', ')}<br/>`;
    h+=`<strong style="color:var(--text)">Risk Levels:</strong> ${(d.risk_levels||[]).join(', ')}<br/>`;
    h+=`<strong style="color:var(--text)">Efficiency Target:</strong> ${d.efficiency_target||'N/A'}<br/>`;
    h+=`<strong style="color:var(--text)">Pass Threshold:</strong> ${d.pass_threshold||'N/A'}`;
    h+=`</div>`;
    document.getElementById('mesias-info').innerHTML=h;
  }catch(e){console.error(e);}
  try{
    const r2=await fetch(API+'/v22/mesias/governance/status');
    const gw=await r2.json();
    document.getElementById('gov-status').innerHTML=`
      <div style="font-size:0.85rem;color:var(--muted);line-height:1.7;">
        Total Decisions: <strong>${gw.total_decisions||0}</strong><br/>
        Pending: <strong style="color:var(--warn);">${gw.pending||0}</strong><br/>
        Resolved: <strong style="color:var(--success);">${gw.resolved||0}</strong><br/>
        Audit Events: <strong>${gw.audit_events||0}</strong>
      </div>`;
  }catch(e){document.getElementById('gov-status').innerHTML='<div style="color:var(--dim)">Unavailable</div>';}
}
async function runEthics(){
  const subject=document.getElementById('eval-subject').value.trim()||'AI System';
  const scores={};DIMS.forEach(d=>{scores[d]=parseFloat(document.getElementById('ed-'+d).value)||0;});
  try{
    const r=await fetch(API+'/v22/mesias/ethics',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject,dimension_scores:scores})});
    const d=await r.json();
    document.getElementById('ethics-result').style.display='grid';
    let bars='';
    (d.scores||[]).forEach(s=>{
      const pct=s.score*100;
      const color=s.score>=0.7?'var(--success)':s.score>=0.4?'var(--warn)':'var(--danger)';
      bars+=`<div class="dim-bar"><span class="dim-name">${s.dimension.replace(/_/g,' ')}</span><div class="dim-track"><div class="dim-fill" style="width:${pct}%;background:${color};"></div></div><span class="dim-val">${s.score.toFixed(2)}</span></div>`;
    });
    document.getElementById('dim-scores').innerHTML=bars;
    document.getElementById('eval-summary').innerHTML=`
      <div class="big-num" style="font-size:2.5rem;">${((d.overall_score||0)*100).toFixed(1)}%</div>
      <div style="margin-top:0.75rem;"><span class="tag ${d.passed?'tag-ok':'tag-err'}">${d.passed?'PASSED':'FAILED'}</span></div>
      ${(d.critical_failures||[]).length?`<div style="margin-top:0.75rem;font-size:0.82rem;color:var(--danger);">Critical: ${d.critical_failures.join(', ')}</div>`:''}
    `;
  }catch(e){alert('Error: '+e.message);}
}
async function runRisk(){
  const op=document.getElementById('risk-op').value.trim()||'Operation';
  const impact=parseFloat(document.getElementById('risk-impact').value)||0;
  const likelihood=parseFloat(document.getElementById('risk-like').value)||0;
  try{
    const r=await fetch(API+'/v22/mesias/risk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operation:op,impact,likelihood})});
    const d=await r.json();
    const colors={minimal:'var(--success)',low:'var(--success)',medium:'var(--warn)',high:'var(--danger)',critical:'var(--danger)'};
    document.getElementById('risk-result').innerHTML=`
      <div style="font-size:0.88rem;">
        <span class="risk-badge" style="background:${colors[d.risk_level]||'var(--muted)'}22;color:${colors[d.risk_level]||'var(--muted)'};">${d.risk_level}</span>
        <span style="margin-left:1rem;color:var(--muted);">Score: ${(d.risk_score||0).toFixed(3)} · Residual: ${(d.residual_risk||0).toFixed(3)}</span>
      </div>`;
  }catch(e){document.getElementById('risk-result').textContent='Error: '+e.message;}
}
init();loadSummary();
</script>
</body>
</html>
