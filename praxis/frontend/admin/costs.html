<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Cost Monitor — Vannus Admin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0f'/%3E%3Ctext x='16' y='23' font-family='-apple-system,Helvetica,sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='%23ef4444'%3E$%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-glass: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.18);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(255,255,255,0.6);
      --text-dim: rgba(255,255,255,0.4);
      --accent: #6366f1;
      --warn: #f5a623;
      --danger: #ef4444;
      --ok: #50e3c2;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; padding: 24px; line-height: 1.5;
    }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 720px) { .grid-3 { grid-template-columns: 1fr; } }
    .card {
      background: var(--bg-glass); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .card.warn { border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.04); }
    .card.danger { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.06); }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); }
    .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .section { margin-top: 28px; }
    .section h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-dim); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { color: var(--text-secondary); font-family: ui-monospace, monospace; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; }
    .pill-ok { background: rgba(80,227,194,0.12); color: var(--ok); }
    .pill-warn { background: rgba(245,166,35,0.15); color: var(--warn); }
    .pill-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
    .pill-tier { background: var(--bg-glass); color: var(--text-secondary); border: 1px solid var(--border); }
    .empty { text-align: center; padding: 32px; color: var(--text-dim); font-size: 12px; }
    .footer-note { font-size: 11px; color: var(--text-dim); margin-top: 36px; line-height: 1.7; padding-top: 16px; border-top: 1px solid var(--border); }
    .footer-note ul { padding-left: 20px; }
    .last-updated { font-size: 10px; color: var(--text-dim); }
    button { font: inherit; cursor: pointer; background: var(--bg-glass); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 11px; }
    button:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .auth-error { padding: 60px 20px; text-align: center; color: var(--text-dim); }
    .auth-error h2 { font-size: 16px; color: var(--danger); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vannus — Cost Monitor</h1>
    <div class="subtitle">
      <span class="last-updated" id="last-updated">Loading…</span>
      &nbsp;·&nbsp;
      <button onclick="loadDashboard()">Refresh</button>
      &nbsp;<span style="color: var(--text-dim);">Auto-refreshes every 60s</span>
    </div>

    <div id="content"></div>
  </div>

  <script>
    const ADMIN_TOKEN = (new URLSearchParams(window.location.search)).get('token') || '';

    async function loadDashboard() {
      const url = '/admin/api/costs/summary' + (ADMIN_TOKEN ? '?token=' + encodeURIComponent(ADMIN_TOKEN) : '');
      try {
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (res.status === 401 || res.status === 403) {
          renderAuthError();
          return;
        }
        if (!res.ok) {
          renderError(`HTTP ${res.status}`);
          return;
        }
        const data = await res.json();
        renderDashboard(data);
      } catch (e) {
        renderError(e.message);
      }
    }

    function fmtUsd(n) { return '$' + (Number(n) || 0).toFixed(4); }
    function fmtUsdShort(n) { return '$' + (Number(n) || 0).toFixed(2); }

    function renderDashboard(d) {
      const summary = d.summary || {};
      const todayClass = summary.today_alert_breached ? 'card danger' : 'card';
      const monthPct = summary.month_pct_of_budget || 0;
      const monthClass = monthPct >= 80 ? 'card warn' : 'card';

      let html = `
        <div class="grid-3">
          <div class="${todayClass}">
            <div class="stat-label">Today's spend (UTC)</div>
            <div class="stat-value">${fmtUsdShort(summary.today_total_usd)}</div>
            <div class="stat-sub">Alert at ${fmtUsdShort(d.thresholds.daily_alert_usd)} / day &middot; ${summary.today_alert_breached ? '<span class="pill pill-danger">BREACHED</span>' : '<span class="pill pill-ok">OK</span>'}</div>
          </div>
          <div class="${monthClass}">
            <div class="stat-label">Month-to-date spend</div>
            <div class="stat-value">${fmtUsdShort(summary.month_total_usd)}</div>
            <div class="stat-sub">${monthPct ? monthPct + '% of $' + d.thresholds.monthly_budget_usd + ' budget' : 'No budget set'}</div>
          </div>
          <div class="card">
            <div class="stat-label">Per-user daily ceiling</div>
            <div class="stat-value">${fmtUsdShort(d.thresholds.per_user_daily_max_usd)}</div>
            <div class="stat-sub">Auto-pause candidate above this</div>
          </div>
        </div>

        <div class="section">
          <h2>Top users today</h2>
          ${(d.top_users_today || []).length === 0
            ? '<div class="empty">No paid LLM activity yet — Room module not shipping until Week 2-3.</div>'
            : `<table>
                <thead><tr><th>User ID</th><th>Tier</th><th>Spend</th><th>Calls</th></tr></thead>
                <tbody>${(d.top_users_today || []).map(u => `
                  <tr>
                    <td>${u.user_id || '<i>(none)</i>'}</td>
                    <td><span class="pill pill-tier">${u.user_tier || '?'}</span></td>
                    <td>${fmtUsd(u.total_usd)}${u.total_usd >= d.thresholds.per_user_daily_max_usd ? ' <span class="pill pill-danger">CAP</span>' : ''}</td>
                    <td>${u.call_count}</td>
                  </tr>`).join('')}
                </tbody>
              </table>`}
        </div>

        <div class="section">
          <h2>Provider breakdown today</h2>
          ${(d.provider_breakdown_today || []).length === 0
            ? '<div class="empty">No provider activity yet.</div>'
            : `<table>
                <thead><tr><th>Provider</th><th>Model</th><th>Spend</th><th>Calls</th></tr></thead>
                <tbody>${(d.provider_breakdown_today || []).map(p => `
                  <tr>
                    <td>${p.provider}</td>
                    <td>${p.model_id}</td>
                    <td>${fmtUsd(p.total_usd)}</td>
                    <td>${p.call_count}</td>
                  </tr>`).join('')}
                </tbody>
              </table>`}
        </div>

        <div class="section">
          <h2>30-day daily series</h2>
          ${(d.daily_series_30d || []).length === 0
            ? '<div class="empty">No daily data yet — chart will populate after first paid Room call.</div>'
            : `<table>
                <thead><tr><th>Date</th><th>Total</th><th>Calls</th></tr></thead>
                <tbody>${(d.daily_series_30d || []).map(s => `
                  <tr><td>${s.date}</td><td>${fmtUsd(s.total_usd)}</td><td>${s.call_count}</td></tr>`).join('')}
                </tbody>
              </table>`}
        </div>

        <div class="footer-note">
          <strong>Notes:</strong>
          <ul>
            ${(d.notes || []).map(n => `<li>${n}</li>`).join('')}
          </ul>
        </div>
      `;
      document.getElementById('content').innerHTML = html;
      document.getElementById('last-updated').textContent = 'Last refreshed: ' + d.generated_at_utc;
    }

    function renderAuthError() {
      document.getElementById('content').innerHTML = `
        <div class="auth-error">
          <h2>401 — Admin token required</h2>
          <p>Add <code>?token=YOUR_PRAXIS_ADMIN_TOKEN</code> to the URL.</p>
          <p style="margin-top:12px;font-size:11px;color:var(--text-dim);">If you are Drake, the token is in the Railway env var <code>PRAXIS_ADMIN_TOKEN</code>.</p>
        </div>
      `;
    }

    function renderError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="auth-error">
          <h2>Error loading dashboard</h2>
          <p>${msg}</p>
          <button onclick="loadDashboard()" style="margin-top:16px;">Retry</button>
        </div>
      `;
    }

    loadDashboard();
    setInterval(loadDashboard, 60_000);
  </script>
</body>
</html>
