<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Praxis — Reasoning Router</title>
<style>
:root{
  --bg:#0a0a0f;--surface:rgba(255,255,255,0.035);--surface-hover:rgba(255,255,255,0.055);
  --elevated:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);
  --text:#f0f0f5;--muted:rgba(255,255,255,0.50);--dim:rgba(255,255,255,0.30);
  --accent:#6366f1;--accent-glow:rgba(99,102,241,0.30);--secondary:#50e3c2;
  --warn:#fb923c;--danger:#ef4444;--success:#34d399;--info:#38bdf8;
  --shadow-card:0 2px 20px rgba(0,0,0,0.28),0 0 0 1px rgba(255,255,255,0.04);
  --radius:12px;--radius-lg:16px;--radius-pill:999px;
  --ease:cubic-bezier(0.16,1,0.3,1);--fast:0.2s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.aurora::before,.aurora::after{content:'';position:absolute;border-radius:50%;filter:blur(140px);opacity:0.18;animation:af 20s ease-in-out infinite alternate;}
.aurora::before{width:500px;height:500px;background:radial-gradient(circle,#6366f1 0%,transparent 70%);top:-12%;left:-6%;}
.aurora::after{width:400px;height:400px;background:radial-gradient(circle,#50e3c2 0%,transparent 70%);bottom:-15%;right:-6%;animation-delay:-9s;}
@keyframes af{0%{transform:translate(0,0) scale(1);}50%{transform:translate(25px,-18px) scale(1.06);}100%{transform:translate(-18px,10px) scale(0.96);}}
.container{max-width:1400px;margin:0 auto;padding:2rem;position:relative;z-index:2;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#f0f0f5 30%,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-header .subtitle{color:var(--muted);font-size:0.9rem;}
.nav{display:flex;gap:0.5rem;flex-wrap:wrap;}
.nav a{padding:0.4rem 1rem;background:var(--surface);color:var(--muted);text-decoration:none;border-radius:var(--radius-pill);font-size:0.8rem;font-weight:500;transition:all var(--fast);backdrop-filter:blur(12px);}
.nav a:hover,.nav a.active{background:var(--surface-hover);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.nav a.active{border:1px solid var(--accent);color:var(--accent);}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2rem;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;}
@media(max-width:1024px){.grid-3{grid-template-columns:1fr;}.grid-2{grid-template-columns:1fr;}}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow-card);backdrop-filter:blur(16px);transition:all var(--fast);}
.card:hover{box-shadow:0 8px 40px rgba(99,102,241,0.14),0 0 0 1px rgba(255,255,255,0.08);}
.card-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);}
.big-num{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-top:0.5rem;}
.bar-fill{height:100%;border-radius:4px;transition:width 1s var(--ease);}
.regime-badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:var(--radius-pill);font-size:0.75rem;font-weight:700;text-transform:uppercase;}
.regime-low{background:rgba(52,211,153,0.15);color:var(--success);}
.regime-medium{background:rgba(251,146,60,0.15);color:var(--warn);}
.regime-high{background:rgba(251,113,133,0.15);color:var(--danger);}
.puzzle-card{background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.12);border-radius:var(--radius);padding:1rem;margin-bottom:0.75rem;}
.puzzle-card h4{font-size:0.9rem;margin-bottom:0.3rem;}
.puzzle-card .meta{font-size:0.78rem;color:var(--muted);}
.tier-row{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid var(--border);}
.tier-row:last-child{border-bottom:none;}
.tier-name{font-size:0.88rem;font-weight:600;flex:1;}
.tier-cost{font-size:0.8rem;color:var(--muted);font-variant-numeric:tabular-nums;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.55rem 1.2rem;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all var(--fast);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;box-shadow:0 2px 16px var(--accent-glow);}
.btn-primary:hover{box-shadow:0 6px 24px rgba(99,102,241,0.40);transform:translateY(-1px);}
input,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:0.6rem 1rem;font-size:0.88rem;width:100%;font-family:inherit;transition:border var(--fast);}
input:focus,textarea:focus{outline:none;border-color:var(--accent);}
.loading{text-align:center;padding:3rem;color:var(--dim);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:0.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.stat-badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.25rem 0.6rem;border-radius:var(--radius-pill);font-size:0.75rem;font-weight:600;}
.stat-badge.green{background:rgba(52,211,153,0.12);color:var(--success);}
.stat-badge.amber{background:rgba(251,146,60,0.12);color:var(--warn);}
.stat-badge.red{background:rgba(251,113,133,0.12);color:var(--danger);}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="container">
  <div class="page-header">
    <div>
      <h1>Reasoning Router</h1>
      <span class="subtitle">Complexity Regimes · Puzzle Environments · Inference Scaling · Task Routing</span>
    </div>
    <nav class="nav">
      <a href="/static/cognitive-dashboard.html">Cognitive</a>
      <a href="/static/reasoning-router.html" class="active">Router</a>
      <a href="/static/dsrp-ontology.html">DSRP</a>
      <a href="/static/codes-resonance.html">CODES</a>
      <a href="/static/coala-memory.html">CoALA</a>
      <a href="/static/repe-transparency.html">RepE</a>
      <a href="/static/mesias-governance.html">MESIAS</a>
    </nav>
  </div>

  <!-- Summary -->
  <div class="grid-3" id="summary-cards">
    <div class="card"><div class="card-title"><span class="dot"></span>Puzzle Environments</div><div class="loading"><div class="spinner"></div></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Model Tiers</div><div class="loading"><div class="spinner"></div></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Router Status</div><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- Route a Task -->
  <div class="card" style="margin-bottom:2rem;">
    <div class="card-title"><span class="dot"></span>Route a Task</div>
    <textarea id="task-input" rows="3" placeholder="Describe a task to route through the complexity engine..."></textarea>
    <div style="display:flex;gap:0.75rem;margin-top:1rem;align-items:center;">
      <button class="btn btn-primary" onclick="routeTask()">Analyze &amp; Route</button>
      <span id="route-status" style="font-size:0.82rem;color:var(--muted);"></span>
    </div>
  </div>

  <!-- Routing Result -->
  <div id="route-result" style="display:none;">
    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="dot"></span>Complexity Assessment</div>
        <div id="complexity-detail"></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot"></span>Routing Decision</div>
        <div id="routing-detail"></div>
      </div>
    </div>
  </div>

  <!-- Puzzle Environments & Model Tiers -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Puzzle Environment Catalog</div>
      <div id="puzzle-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>Model Tier Directory</div>
      <div id="tier-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
async function loadSummary(){
  try{
    const r = await fetch(API+'/v22/reasoning-router/summary');
    const d = await r.json();
    const cards = document.querySelectorAll('#summary-cards .card');
    const envs = d.puzzle_environments||{};
    const tiers = d.model_tiers||{};
    cards[0].innerHTML=`<div class="card-title"><span class="dot"></span>Puzzle Environments</div><div class="big-num">${Object.keys(envs).length}</div><div style="color:var(--muted);font-size:0.82rem;margin-top:0.5rem">Registered environments</div>`;
    cards[1].innerHTML=`<div class="card-title"><span class="dot"></span>Model Tiers</div><div class="big-num">${Object.keys(tiers).length}</div><div style="color:var(--muted);font-size:0.82rem;margin-top:0.5rem">Available tiers</div>`;
    cards[2].innerHTML=`<div class="card-title"><span class="dot"></span>Router Status</div><div class="big-num" style="font-size:2rem;">Online</div><div style="color:var(--muted);font-size:0.82rem;margin-top:0.5rem">v22 Cognitive Resilience</div>`;
    // Puzzles
    let ph='';
    for(const[name,env] of Object.entries(envs)){ph+=`<div class="puzzle-card"><h4>${name.replace(/_/g,' ')}</h4><div class="meta">Scaling: ${env.scaling} · Formula: ${env.formula||'N/A'}</div></div>`;}
    document.getElementById('puzzle-list').innerHTML=ph||'<div style="color:var(--dim)">No environments</div>';
    // Tiers
    let th='';
    for(const[name,tier] of Object.entries(tiers)){th+=`<div class="tier-row"><span class="tier-name">${name}</span><span class="tier-cost">${tier.cost_multiplier||'?'}× cost</span></div>`;}
    document.getElementById('tier-list').innerHTML=th||'<div style="color:var(--dim)">No tiers</div>';
  }catch(e){console.error(e);}
}
async function routeTask(){
  const task=document.getElementById('task-input').value.trim();
  if(!task){document.getElementById('route-status').textContent='Enter a task description';return;}
  document.getElementById('route-status').textContent='Routing...';
  try{
    const r=await fetch(API+'/v22/reasoning-router/route',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_description:task})});
    const d=await r.json();
    document.getElementById('route-result').style.display='block';
    const a=d.assessment||{};
    const regime=a.regime||'unknown';
    const rc=regime==='LOW'?'regime-low':regime==='MEDIUM'?'regime-medium':'regime-high';
    document.getElementById('complexity-detail').innerHTML=`
      <div style="margin-bottom:1rem;"><span class="regime-badge ${rc}">${regime}</span></div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Score: <strong style="color:var(--text)">${(a.score||0).toFixed(3)}</strong></div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Depth: <strong style="color:var(--text)">${a.compositional_depth||0}</strong></div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Estimated Moves: <strong style="color:var(--text)">${a.estimated_moves||0}</strong></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(a.score||0)*100}%;background:linear-gradient(90deg,var(--success),var(--warn),var(--danger));"></div></div>
    `;
    document.getElementById('routing-detail').innerHTML=`
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Model Tier: <strong style="color:var(--accent)">${d.model_tier||'N/A'}</strong></div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Token Budget: <strong style="color:var(--text)">${d.token_budget||'N/A'}</strong></div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Decompose: <strong style="color:var(--text)">${d.should_decompose?'Yes':'No'}</strong></div>
      <div style="font-size:0.85rem;color:var(--muted);">Reasoning: ${d.reasoning||''}</div>
    `;
    document.getElementById('route-status').textContent='';
  }catch(e){document.getElementById('route-status').textContent='Error: '+e.message;}
}
loadSummary();
</script>
</body>
</html>
