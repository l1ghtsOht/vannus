<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Praxis — CoALA Memory System</title>
<style>
:root{--bg:#0a0a0f;--surface:rgba(255,255,255,0.035);--surface-hover:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.06);--text:#f0f0f5;--muted:rgba(255,255,255,0.50);--dim:rgba(255,255,255,0.30);--accent:#6366f1;--accent-glow:rgba(99,102,241,0.30);--secondary:#50e3c2;--warn:#fb923c;--danger:#ef4444;--success:#34d399;--info:#38bdf8;--shadow-card:0 2px 20px rgba(0,0,0,0.28),0 0 0 1px rgba(255,255,255,0.04);--radius:12px;--radius-lg:16px;--radius-pill:999px;--ease:cubic-bezier(0.16,1,0.3,1);--fast:0.2s cubic-bezier(0.4,0,0.2,1);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.aurora::before,.aurora::after{content:'';position:absolute;border-radius:50%;filter:blur(140px);opacity:0.18;animation:af 20s ease-in-out infinite alternate;}
.aurora::before{width:500px;height:500px;background:radial-gradient(circle,#6366f1 0%,transparent 70%);top:-12%;left:-6%;}
.aurora::after{width:400px;height:400px;background:radial-gradient(circle,#50e3c2 0%,transparent 70%);bottom:-15%;right:-6%;animation-delay:-9s;}
@keyframes af{0%{transform:translate(0,0) scale(1);}50%{transform:translate(25px,-18px) scale(1.06);}100%{transform:translate(-18px,10px) scale(0.96);}}
.container{max-width:1400px;margin:0 auto;padding:2rem;position:relative;z-index:2;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#f0f0f5 30%,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-header .subtitle{color:var(--muted);font-size:0.9rem;}
.nav{display:flex;gap:0.5rem;flex-wrap:wrap;}
.nav a{padding:0.4rem 1rem;background:var(--surface);color:var(--muted);text-decoration:none;border-radius:var(--radius-pill);font-size:0.8rem;font-weight:500;transition:all var(--fast);backdrop-filter:blur(12px);}
.nav a:hover,.nav a.active{background:var(--surface-hover);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.nav a.active{border:1px solid var(--accent);color:var(--accent);}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2rem;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;}
@media(max-width:1024px){.grid-4,.grid-2{grid-template-columns:1fr;}}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow-card);backdrop-filter:blur(16px);transition:all var(--fast);}
.card:hover{box-shadow:0 8px 40px rgba(99,102,241,0.14),0 0 0 1px rgba(255,255,255,0.08);}
.card-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);}
.big-num{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-top:0.5rem;}
.bar-fill{height:100%;border-radius:4px;transition:width 1s var(--ease);}
.mem-icon{font-size:1.5rem;margin-bottom:0.3rem;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.55rem 1.2rem;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all var(--fast);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;box-shadow:0 2px 16px var(--accent-glow);}
.btn-primary:hover{box-shadow:0 6px 24px rgba(99,102,241,0.40);transform:translateY(-1px);}
select,input,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:0.5rem 0.8rem;font-size:0.85rem;font-family:inherit;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent);}
.loading{text-align:center;padding:3rem;color:var(--dim);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:0.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.entry-item{padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.82rem;}
.entry-item:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="container">
  <div class="page-header">
    <div>
      <h1>CoALA Memory System</h1>
      <span class="subtitle">Working · Episodic · Semantic · Procedural · Global Workspace · IIT Φ</span>
    </div>
    <nav class="nav">
      <a href="/static/cognitive-dashboard.html">Cognitive</a>
      <a href="/static/reasoning-router.html">Router</a>
      <a href="/static/dsrp-ontology.html">DSRP</a>
      <a href="/static/codes-resonance.html">CODES</a>
      <a href="/static/coala-memory.html" class="active">CoALA</a>
      <a href="/static/repe-transparency.html">RepE</a>
      <a href="/static/mesias-governance.html">MESIAS</a>
    </nav>
  </div>

  <!-- Memory Module Cards -->
  <div class="grid-4" id="mem-cards">
    <div class="card" style="text-align:center;"><div class="mem-icon">⚡</div><div style="font-weight:700;">Working</div><div id="mem-working" style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem;">Loading...</div></div>
    <div class="card" style="text-align:center;"><div class="mem-icon">📖</div><div style="font-weight:700;">Episodic</div><div id="mem-episodic" style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem;">Loading...</div></div>
    <div class="card" style="text-align:center;"><div class="mem-icon">🧠</div><div style="font-weight:700;">Semantic</div><div id="mem-semantic" style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem;">Loading...</div></div>
    <div class="card" style="text-align:center;"><div class="mem-icon">🔧</div><div style="font-weight:700;">Procedural</div><div id="mem-procedural" style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem;">Loading...</div></div>
  </div>

  <!-- Store & Retrieve -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Store Memory</div>
      <select id="store-type" style="width:100%;margin-bottom:0.75rem;">
        <option value="working">Working</option>
        <option value="episodic">Episodic</option>
        <option value="semantic">Semantic</option>
        <option value="procedural">Procedural</option>
      </select>
      <textarea id="store-content" rows="3" placeholder="Content to store..." style="width:100%;margin-bottom:0.75rem;"></textarea>
      <button class="btn btn-primary" onclick="storeMemory()">Store</button>
      <div id="store-result" style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;"></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>Retrieve Memory</div>
      <input id="retrieve-query" placeholder="Search query..." style="width:100%;margin-bottom:0.75rem;"/>
      <button class="btn btn-primary" onclick="retrieveMemory()">Cross-Retrieve</button>
      <div id="retrieve-result" style="margin-top:1rem;"></div>
    </div>
  </div>

  <!-- GWT & Phi -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Global Workspace (GWT)</div>
      <div id="gwt-status"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>IIT Φ Metric</div>
      <div id="phi-status"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
const API=window.location.origin;
async function loadStatus(){
  try{
    const r=await fetch(API+'/v22/coala/memory/status');
    const d=await r.json();
    for(const[type,info] of Object.entries(d)){
      const el=document.getElementById('mem-'+type);
      if(el){el.innerHTML=`${info.entries}/${info.capacity} entries<br/>Util: ${((info.utilization||0)*100).toFixed(0)}%<div class="bar-track"><div class="bar-fill" style="width:${(info.utilization||0)*100}%;background:var(--accent);"></div></div>`;}
    }
  }catch(e){console.error(e);}
  try{
    const r2=await fetch(API+'/v22/coala/workspace/status');
    const gw=await r2.json();
    document.getElementById('gwt-status').innerHTML=`
      <div style="font-size:0.85rem;color:var(--muted);line-height:1.7;">
        Candidates: <strong>${gw.candidates||0}</strong><br/>
        Total Broadcasts: <strong>${gw.total_broadcasts||0}</strong><br/>
        ${gw.current_broadcast?`Current: <strong style="color:var(--accent)">${(gw.current_broadcast.content||'').substring(0,80)}</strong>`:'No active broadcast'}
      </div>`;
  }catch(e){document.getElementById('gwt-status').innerHTML='<div style="color:var(--dim)">Unavailable</div>';}
  try{
    const r3=await fetch(API+'/v22/coala/summary');
    const sm=await r3.json();
    const phi=sm.iit_phi||{};
    document.getElementById('phi-status').innerHTML=`
      <div style="font-size:0.85rem;color:var(--muted);line-height:1.7;">
        Metric: <strong style="color:var(--text)">${phi.metric||'Φ'}</strong><br/>
        Levels: ${Object.entries(phi.levels||{}).map(([k,v])=>`${k}: ${v}`).join(' · ')}
      </div>`;
  }catch(e){document.getElementById('phi-status').innerHTML='<div style="color:var(--dim)">Unavailable</div>';}
}
async function storeMemory(){
  const type=document.getElementById('store-type').value;
  const content=document.getElementById('store-content').value.trim();
  if(!content){document.getElementById('store-result').textContent='Enter content';return;}
  try{
    const r=await fetch(API+'/v22/coala/memory/store',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({memory_type:type,content})});
    const d=await r.json();
    document.getElementById('store-result').textContent=`Stored: ${d.entry_id||'OK'}`;
    loadStatus();
  }catch(e){document.getElementById('store-result').textContent='Error: '+e.message;}
}
async function retrieveMemory(){
  const q=document.getElementById('retrieve-query').value.trim();
  if(!q){return;}
  try{
    const r=await fetch(API+'/v22/coala/memory/retrieve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
    const d=await r.json();
    let h='';
    for(const[type,entries] of Object.entries(d)){
      if(entries.length){h+=`<div style="font-weight:600;font-size:0.82rem;text-transform:uppercase;color:var(--accent);margin-top:0.75rem;">${type}</div>`;
        entries.forEach(e=>{h+=`<div class="entry-item"><strong>${e.entry_id}</strong> — ${(e.content||'').substring(0,120)}</div>`;});
      }
    }
    document.getElementById('retrieve-result').innerHTML=h||'<div style="color:var(--dim)">No results</div>';
  }catch(e){document.getElementById('retrieve-result').textContent='Error: '+e.message;}
}
loadStatus();
</script>
</body>
</html>
