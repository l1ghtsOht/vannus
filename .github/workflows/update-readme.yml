name: Update README Stats

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'          # avoid infinite loop when we push the updated README

permissions:
  contents: write             # needed to push the commit back

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so git log works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update_readme.py
        run: python scripts/update_readme.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet README.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(auto): update README stats [skip ci]"
          git push
